name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

jobs:
  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v4
        with:
          node-version-file: ".nvmrc"
          cache: pnpm

      - run: pnpm install --frozen-lockfile
      - run: pnpm typecheck
      - run: pnpm check
      - run: pnpm build
      - run: pnpm test

  backend-lint:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v6

      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          cache-dependency-glob: backend/uv.lock

      - run: uv sync
      - run: uv run ruff check agent/
      - run: uv run ruff format --check agent/

  backend-test:
    runs-on: windows-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v6

      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          cache-dependency-glob: backend/uv.lock

      - run: uv sync --extra tools
      - run: uv run pytest --cov=agent --cov-fail-under=79 -q

  rust:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install system deps
        run: sudo apt-get update && sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          cache: true

      - run: cargo check --manifest-path src-tauri/Cargo.toml
      - run: cargo clippy --manifest-path src-tauri/Cargo.toml -- -D warnings

  build:
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    needs: [frontend, backend-lint, rust]
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v4
        with:
          node-version-file: ".nvmrc"
          cache: pnpm

      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          cache: true

      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          cache-dependency-glob: backend/uv.lock

      - name: Get version from git tag
        run: |
          $tag = git describe --tags --abbrev=0 2>$null
          if ($tag) { "APP_VERSION=$tag" | Out-File -FilePath $Env:GITHUB_ENV -Append }
        shell: pwsh

      - run: pnpm install --frozen-lockfile
      - run: pnpm build
      - run: pnpm build:backend

      - uses: actions/cache@v6
        with:
          path: src-tauri/target
          key: ${{ runner.os }}-tauri-${{ hashFiles('src-tauri/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-tauri-

      - run: pnpm build:app

      - uses: actions/upload-artifact@v4
        with:
          name: warden-desktop-${{ env.APP_VERSION || github.sha }}
          path: |
            src-tauri/target/release/bundle/nsis/*.exe
            src-tauri/target/release/bundle/msi/*.msi
