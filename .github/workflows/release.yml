name: release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: ".nvmrc"
          cache: pnpm

      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          cache: true

      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-dependency-glob: backend/uv.lock

      - run: pnpm install --frozen-lockfile
      - run: pnpm build
      - run: pnpm build:backend
      - run: pnpm build:app

      - uses: actions/upload-artifact@v4
        with:
          name: artifacts
          path: |
            src-tauri/target/release/bundle/nsis/*.exe
            src-tauri/target/release/bundle/msi/*.msi

  release:
    needs: [build]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get changelog since previous tag
        run: |
          PREV_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")
          if [ -z "$PREV_TAG" ]; then
            git log --pretty=format:"%s" --reverse > changelog.txt
          else
            echo "Previous tag: $PREV_TAG"
            git log --pretty=format:"%s" --reverse "$PREV_TAG..HEAD" > changelog.txt
          fi

      - name: Generate release notes via OpenRouter
        id: ai_notes
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
        run: |
          jq -n \
            --arg model "deepseek/deepseek-v4-flash" \
            --rawfile changelog changelog.txt \
            '{
              model: $model,
              messages: [
                {
                  role: "system",
                  content: "You write release notes in English. Rules:\n- Write in a clear, human-readable way for end users\n- No technical noise: no commit hashes, no feat/fix/chore/refactor prefixes\n- Skip internal changes that don't affect the user\n- Group changes by theme (new features, improvements, bug fixes)\n- Plain text format\n- No unnecessary introductions or conclusions"
                },
                {
                  role: "user",
                  content: "Here are the commits since the last release. Write release notes in English that are useful for end users:\n\n\($changelog)"
                }
              ]
            }' > request.json

          curl -s -X POST https://openrouter.ai/api/v1/chat/completions \
            -H "Authorization: Bearer $OPENROUTER_API_KEY" \
            -H "Content-Type: application/json" \
            -d @request.json \
            | jq -r '.choices[0].message.content' > release_notes.md

          echo "=== Generated release notes ==="
          cat release_notes.md

      - uses: actions/download-artifact@v4
        with:
          name: artifacts
          path: artifacts

      - uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**
          body_path: release_notes.md
