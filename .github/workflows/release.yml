name: release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v7

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v6
        with:
          node-version-file: ".nvmrc"
          cache: pnpm

      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          cache: true

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: 'go.mod'

      - name: Set version from tag
        run: |
          $ver = "$Env:GITHUB_REF_NAME".TrimStart("v")
          Write-Host "version: $ver"
          $verJson = $ver -replace '"', '\"'
          (Get-Content package.json) -replace '"version":\s*"[^"]*"', "`"version`": `"$verJson`"" | Set-Content package.json -Encoding utf8
          (Get-Content src-tauri/tauri.conf.json) -replace '"version":\s*"[^"]*"', "`"version`": `"$verJson`"" | Set-Content src-tauri/tauri.conf.json -Encoding utf8
          (Get-Content src-tauri/Cargo.toml) -replace '^version\s*=\s*"[^"]*"', "version = `"$ver`"" | Set-Content src-tauri/Cargo.toml -Encoding utf8
        shell: pwsh

      - run: pnpm install --frozen-lockfile
      - run: pnpm build
        env:
          APP_VERSION: ${{ github.ref_name }}
      - run: pnpm build:backend

      - uses: actions/cache@v6
        with:
          path: src-tauri/target
          key: ${{ runner.os }}-tauri-${{ hashFiles('src-tauri/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-tauri-

      - run: pnpm build:app

      - uses: actions/upload-artifact@v4
        with:
          name: artifacts
          path: |
            src-tauri/target/release/bundle/nsis/*.exe
            src-tauri/target/release/bundle/nsis/*.nsis.zip
            src-tauri/target/release/bundle/nsis/*.nsis.zip.sig

  release:
    needs: [build]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Get changelog since previous tag
        run: |
          PREV_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")
          if [ -z "$PREV_TAG" ]; then
            git log --pretty=format:"%s" --reverse > changelog.txt
          else
            echo "Previous tag: $PREV_TAG"
            git log --pretty=format:"%s" --reverse "$PREV_TAG..HEAD" > changelog.txt
          fi

      - name: Generate release notes via OpenRouter
        id: ai_notes
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
        run: |
          SYSTEM_PROMPT="You write release notes in English for a desktop AI assistant app called Warden. Rules:
          - Write for end users, not developers — clear and direct
          - No technical noise: no commit hashes, no feat/fix/chore/refactor/perf prefixes, no PR numbers, no file names
          - SKIP anything internal — rendering layers, GPU promotion, CORS, auth middleware, blur layers, scroll internals, animation internals, CSS fixes, build/CI/test changes. If a non-developer wouldn't notice it or care, skip it.
          - SKIP pure visual polish changes (tweaked gradients, background effects) unless they meaningfully change the experience
          - Group changes into plain sections (only include sections that have content):
            What's new
            Improved
            Fixed
          - Cap each section at 5 bullets maximum — pick only the most impactful ones
          - Plain bullet lists, no emojis anywhere
          - Each bullet: one clear sentence, user-benefit focus
          - Tone: direct, no marketing fluff"

          USER_PREFIX="Here are the commits since the last release. Write user-facing release notes:"

          jq -n \
            --arg model "deepseek/deepseek-v4-flash" \
            --arg system "$SYSTEM_PROMPT" \
            --arg user_prefix "$USER_PREFIX" \
            --rawfile changelog changelog.txt \
            '{
              model: $model,
              messages: [
                {role: "system", content: $system},
                {role: "user", content: ($user_prefix + "\n\n" + $changelog)}
              ]
            }' > request.json

          AI_BODY=$(curl -s -X POST https://openrouter.ai/api/v1/chat/completions \
            -H "Authorization: Bearer $OPENROUTER_API_KEY" \
            -H "Content-Type: application/json" \
            -d @request.json \
            | jq -r '.choices[0].message.content // "Release notes unavailable."')

          TAG="${GITHUB_REF_NAME}"
          DATE=$(date +'%B %d, %Y')

          printf "_%s_\n\n---\n\n%s\n" \
            "$DATE" "$AI_BODY" > release_notes.md

          echo "=== Generated release notes ==="
          cat release_notes.md

      - uses: actions/download-artifact@v8
        with:
          name: artifacts
          path: artifacts

      - name: Generate latest.json for in-app updater
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          TAG="${GITHUB_REF_NAME}"
          SIG=$(cat artifacts/*.nsis.zip.sig)
          ZIP_NAME=$(basename artifacts/*.nsis.zip)
          PUB_DATE=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          jq -n \
            --arg version "$VERSION" \
            --arg sig "$SIG" \
            --arg url "https://github.com/elev1e1nSure/warden-desktop/releases/download/$TAG/$ZIP_NAME" \
            --arg pub_date "$PUB_DATE" \
            '{
              version: $version,
              notes: "",
              pub_date: $pub_date,
              platforms: {
                "windows-x86_64": { signature: $sig, url: $url }
              }
            }' > latest.json

      - uses: softprops/action-gh-release@v3
        with:
          files: |
            artifacts/**
            latest.json
          body_path: release_notes.md
