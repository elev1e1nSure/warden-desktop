[pytest]
asyncio_mode = auto
testpaths = agent
tmp_path_retention_count = 1
addopts = --cov=agent --cov-fail-under=80 --cov-report=term-missing --cov-report=html:htmlcov --cov-report=json:coverage.json

[coverage:run]
source = agent
branch = true
relative_files = true

[coverage:report]
show_missing = true
skip_covered = true
precision = 1
